<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HZ Doll 后台管理</title>
<style>
/* 复用前台样式，保持一致性 */
:root{
 --bg:#fff7fb;
 --bg2:#ffe8f3;
 --primary:#ff4fa1;
 --secondary:#ff87bf;
 --dark:#2b1c24;
 --card:#ffffffcc;
 --border:#ffd0e6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
 background:linear-gradient(180deg,var(--bg),#fff);
 color:var(--dark);
}
.dashboard{
 padding:120px 30px;
 width:min(1300px,94%);
 margin:auto;
}
.title{
 font-size:54px;
 margin-bottom:40px;
 color:var(--primary);
}
.card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:28px;
 padding:30px;
 backdrop-filter:blur(10px);
 box-shadow:0 10px 30px #ffb6d333;
}
table{
 width:100%;
 border-collapse:collapse;
 background:white;
 border-radius: 18px;
 overflow: hidden;
}
th,td{
 padding:16px;
 border-bottom:1px solid #eee;
 text-align: left;
}
th{
 background: #fff0f7;
 color: var(--primary);
}
</style>
</head>
<body>

<div class="dashboard">
<h1 class="title">后台管理系统</h1>

<div class="card">
<h2>报名数据（演示）</h2>

<table>
<tr>
<th>昵称</th>
<th>类型</th>
<th>联系方式</th>
<th>状态</th>
</tr>

<tr>
<td>ICE</td>
<td>主办方</td>
<td>1042921865</td>
<td>已确认</td>
</tr>

<tr>
<td>摄影组</td>
<td>摄影师</td>
<td>QQ联系</td>
<td>审核中</td>
</tr>

<tr>
<td>原创摊主</td>
<td>商业摊</td>
<td>商务合作</td>
<td>已通过</td>
</tr>

</table>
</div>
</div>

</body>
</html>
