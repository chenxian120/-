<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 命名空间隔离，避免冲突 -->
<style>
/* 前缀tps_隔离样式，不影响网站原有样式 */
.tps_modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 99999; /* 提高层级，确保显示在最上层 */
  margin: 0;
  padding: 0;
  border: none;
}
.tps_modal-content {
  background: white;
  padding: 25px;
  border-radius: 8px;
  text-align: center;
  max-width: 300px;
  box-sizing: border-box;
  margin: 0;
  border: none;
}
.tps_qrcode {
  width: 220px;
  height: 220px;
  margin: 15px auto;
  display: block;
  border: none;
}
.tps_close-btn {
  padding: 10px 20px;
  border: none;
  border-radius: 4px;
  background: #eee;
  cursor: pointer;
  margin-top: 10px;
}
.tps_pay-btn {
  padding: 10px 25px;
  border: none;
  border-radius: 4px;
  background: #ff4444;
  color: white;
  cursor: pointer;
  margin: 0 8px;
}
.tps_buy-btn {
  padding: 12px 30px;
  background: #ff4444;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  margin: 20px 0;
}
</style>
</head>
<body>
<!-- 购票按钮（添加独立类名，避免冲突） -->
<button class="tps_buy-btn" onclick="tps_showOrder()">立即购票</button>

<!-- 订单确认弹窗 -->
<div id="tps_orderModal" class="tps_modal">
  <div class="tps_modal-content">
    <h3 style="margin:0 0 20px 0;">订单确认</h3>
    <p style="font-size:16px; margin:10px 0;">票价：399元</p>
    <button class="tps_pay-btn" onclick="tps_showWechat()">微信支付</button>
    <button class="tps_pay-btn" onclick="tps_showAlipay()">支付宝支付</button>
    <button class="tps_close-btn" onclick="tps_closeModal('tps_orderModal')" style="margin-top:15px;">取消</button>
  </div>
</div>

<!-- 微信支付弹窗（完整真实收款码Base64） -->

         class="tps_qrcode" alt="微信支付">
    <p style="margin:0 0 15px 0;">请使用微信扫描支付</p>
    <button class="tps_close-btn" onclick="tps_closeModal('tps_wechatModal')">关闭</button>
  </div>
</div>

<!-- 支付宝支付弹窗（完整真实收款码Base64） -->
<div id="tps_alipayModal" class="tps_modal">
  <div class="tps_modal-content">
    <h3 style="margin:0 0 10px 0;">支付宝支付</h3>

         class="tps_qrcode" alt="支付宝支付">
    <p style="margin:0 0 15px 0;">请使用支付宝扫描支付</p>
    <button class="tps_close-btn" onclick="tps_closeModal('tps_alipayModal')">关闭</button>
  </div>
</div>

<!-- 独立JS函数，前缀tps_避免冲突 -->
<script>
// 订单确认弹窗
function tps_showOrder() {
  document.getElementById('tps_orderModal').style.display = 'flex';
}
// 微信支付弹窗
function tps_showWechat() {
  document.getElementById('tps_orderModal').style.display = 'none';
  document.getElementById('tps_wechatModal').style.display = 'flex';
}
// 支付宝支付弹窗
function tps_showAlipay() {
  document.getElementById('tps_orderModal').style.display = 'none';
  document.getElementById('tps_alipayModal').style.display = 'flex';
}
// 关闭弹窗
function tps_closeModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}
</script>
</body>
</html>
