<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购票系统</title>
<style>
/* 核心弹窗样式（极简无冗余） */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.modal-content {
  background: white;
  padding: 20px;
  border-radius: 8px;
  text-align: center;
  max-width: 300px;
}
.qrcode {
  width: 200px;
  height: 200px;
  margin: 0 auto 15px;
}
.close-btn {
  padding: 8px 16px;
  border: none;
  border-radius: 4px;
  background: #eee;
  cursor: pointer;
}
</style>
</head>
<body>
<!-- 购票按钮 -->
<button onclick="document.getElementById('orderModal').style.display='flex'" 
        style="padding:10px 20px; background:#ff4444; color:white; border:none; border-radius:4px; cursor:pointer;">
  立即购票
</button>

<!-- 订单确认弹窗（价格已改为399元） -->
<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3>订单确认</h3>
    <p>票价：399元</p>
    <button onclick="document.getElementById('orderModal').style.display='none'; document.getElementById('wechatModal').style.display='flex'">微信支付</button>
    <button onclick="document.getElementById('orderModal').style.display='none'; document.getElementById('alipayModal').style.display='flex'">支付宝支付</button>
  </div>
</div>
